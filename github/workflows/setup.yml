name: SA-AKHRAN Automated Sluice Gate Setup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Purge Legacy and Conflict Clutter Files
        run: |
          echo "[*] Cleaning old build artifacts and purging redundant clutter..."
          rm -f index.html installer.html sa_akhran.bat Install_SA_AKHRAN.de...
          rm -f engine_system *.bin *.log

      - name: Compile Sluice-Bench Infrastructure
        run: |
          echo "[*] Executing multi-file compiler serialization across memory lines..."
          gcc main_coordinator.c src/state_controller.c src/ui_touch_mapping.c file_one_voip_ingress.c file_two_filtration.c file_three_voip_egress.c -lpthread -O2 -o engine_system
          
          if [ $? -eq 0 ]; then
            echo "[+] Pipeline compilation successful: 'engine_system' generated."
            echo "[+] Sluice Protected Guard successfully mounted."
          else
            echo "[-] Error: Cross-compilation failed."
            exit 1
          fi
