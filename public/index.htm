<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SA-AKHRAN Control</title>
    <style>
        body { background-color: #0b132b; color: #ffffff; font-family: monospace; text-align: center; padding-top: 50px; }
        .btn { display: block; width: 80%; max-width: 400px; margin: 20px auto; padding: 20px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .start { background-color: #00b4d8; color: #fff; }
        .stop { background-color: #d90429; color: #fff; }
        .sword { background-color: #ffb703; color: #000; font-size: 1.8rem; }
        #status-display { font-size: 1.2rem; color: #4ade80; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>SA-AKHRAN CORE</h1>
    <div id="status-display">SYSTEM STATUS: STANDBY</div>

    <button class="btn start" onclick="sendCommand('START')">Start</button>
    <button class="btn stop" onclick="sendCommand('STOP')">Stop</button>
    <button class="btn sword" onclick="sendCommand('SWORD')">⚔️ SWORD</button>

    <script>
        function sendCommand(action) {
            console.log(`Executing: ${action}`);
            fetch(`/api/control?action=${action}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                document.getElementById('status-display').innerText = `SYSTEM STATUS: ${data.status}`;
            }).catch(err => console.error("Execution error:", err));
        }
    </script>
</body>
</html>
