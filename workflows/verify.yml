name: SA-AKHRAN Root Path Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Verify Strict Root Folders Matrix
      run: |
        echo "Validating bracket-free directory matrix layout..."
        if [ ! -d "workflows" ]; then
          echo "ERROR: Root path 'workflows' missing or misplaced."
          exit 1
        fi
        if [ ! -d "calculations/dump" ]; then
          echo "ERROR: Pipeline path 'calculations/dump' missing or broken."
          exit 1
        fi
        if [ ! -d "hidden" ]; then
          echo "ERROR: Protected path 'hidden' missing or broken."
          exit 1
        fi
        echo "Success: All structural folder boundaries verified."

    - name: Compile Hidden Core Architecture
      run: |
        echo "Assembling system backend logic modules..."
        gcc hidden/main.c hidden/gateway.c hidden/engine.c hidden/collector.c hidden/voip.c -o sa_akhran_test_core
        echo "Success: Standalone native execution binary compiled flawlessly."

    - name: Execute Core Verification Run
      run: |
        echo "Booting testing runtime package..."
        ./sa_akhran_test_core
        echo "Success: Telemetry calculation streams cleared through all stages."
